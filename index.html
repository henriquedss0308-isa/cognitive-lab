<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/app-icon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="COGNITIVE LAB — Seu laboratório cognitivo pessoal" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>COGNITIVE LAB</title>
    <script>
      // Aparência antes de qualquer pintura. Os módulos são deferidos, então sem
      // isto o fundo escuro apareceria por um frame para quem escolheu o claro.
      // Fonte da verdade continua no IndexedDB (ver src/theme/theme.ts).
      try {
        var t = localStorage.getItem('cognitive-lab:theme')
        var s = parseFloat(localStorage.getItem('cognitive-lab:font-scale'))
        document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark')
        if (s >= 0.8 && s <= 1.4) {
          document.documentElement.style.setProperty('--lab-font-scale', String(s))
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
